<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta name="description" content="Game for body fit with style and fun">
  <meta name="keywords" content="boxing, fitness, game, online">
  <meta name="author" content="Saashup">
  <title>box4fitapp</title>
</head>

<body style="margin: 20px; padding: 20px;">
  <style type="text/css">
    .myTable {
      background-color: #000;
      border-collapse: collapse;
      width: 100%;
    }

    .myTable th {
      background-color: #000;
      color: white;
      width: 9%;
    }

    .myTable td,
    .myTable th {
      padding: 5px;
      background-color: #000;
      border: 1px solid #000;
      text-align: center;
    }
    .button {
      border: none;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      border-radius: 8px;
    }
    .button-clear {
      background-color: #646400;
      color: white;
    }
    .button-clear:hover {
      opacity: 0.7;
    }
    .button-play {
      background-color: #640064;
      color: white;
    }
    .button-play:hover {
      opacity: 0.7;
    }

  </style>
  <table width="100%" style="text-align:center;"><tr><td><button class="button button-play" id="play" onclick="window.location.href='/';">play</button></td><td><button class="button button-clear" id="clear">clear</button></td></tr></table>
  <div id="me"></div>
  <script src="me.js"></script>
</body>

</html>
