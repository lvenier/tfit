<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta name="description" content="Game for body fit with style and fun">
  <meta name="keywords" content="boxing, fitness, game, online">
  <meta name="author" content="Saashup">
  <title>box4fitapp</title>
</head>

<body style="margin: 20px; padding: 20px;">
  <style type="text/css">
    .myTable {
      background-color: #000;
      border-collapse: collapse;
      width: 100%;
    }

    .myTable th {
      background-color: #000;
      color: white;
      width: 9%;
    }

    .myTable td,
    .myTable th {
      padding: 5px;
      background-color: #000;
      border: 1px solid #000;
      text-align: center;
    }
    .button {
      background-color: grey; /* Green */
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      border-radius: 8px;
    }
    .button:hover {
      background-color: white; /* Green */
      color: grey;
    }
  </style>
  <div style="text-align:right;"><button class="button" id="clear">clear</button></div>
  <script src="me.js"></script>
</body>

</html>
