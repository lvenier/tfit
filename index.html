<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A webcam boxing fitness game with motion detection">
  <meta name="keywords" content="boxing, fitness, game, online">
  <meta name="author" content="Saashup">
  <meta name="theme-color" content="#050505">
  <link rel="apple-touch-icon" href="assets/logos/logo.192.png">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>Box4Fit</title>
  <link rel="manifest" href="manifest.json" />
  <script src="js/p5js/p5.js"></script>
  <script src="js/p5js/p5.sound.js"></script>
  <script src="js/ml5js/ml5.min.js"></script>
  <script src="js/game-utils.js"></script>
  <script src="js/game-config.js"></script>
  <script src="js/game-state.js"></script>
  <script src="js/runtime-utils.js"></script>
  <script src="js/layout-state.js"></script>
  <script src="js/ui-state.js"></script>
  <script src="js/loading-progress.js"></script>
  <script src="js/pose-state.js"></script>
  <script src="js/calibration-state.js"></script>
  <script src="js/timing-state.js"></script>
  <script src="js/game-assets.js"></script>
  <script src="js/game-calibration.js"></script>
  <script src="js/game-input.js"></script>
  <script src="js/game-logic.js"></script>
  <script src="js/game-round.js"></script>
  <script src="js/game-render.js"></script>
  <script src="js/opponent/raja.js"></script>
  <script src="js/opponent/theo.js"></script>
  <script src="js/opponent/vehbo.js"></script>
  <script src="js/game-score.js"></script>
  <script src="js/game-flow.js"></script>
  <script src="js/app-input-actions.js"></script>
  <script src="js/app-events.js"></script>
  <script src="js/camera-runtime.js"></script>
  <script src="js/settings-screen.js"></script>
  <script src="js/pose-detection.js"></script>
  <script src="js/fight-mode.js"></script>
  <script src="js/pad-mode.js"></script>
  <script src="js/shadow-mode.js"></script>
  <script src="js/screen-router.js"></script>
  <script src="js/face-recognition.js"></script>
  <script src="js/app-lifecycle.js"></script>
  <script src="js/app-bootstrap.js"></script>
</head>

<body>
  <main>
    <div id="p5_loading">
      <div style="position: absolute;left:50%;top:50%;transform: translate(-50%, -50%);">
        <div class="loader"></div>
      </div>
      <div style="position: absolute;left:50%;top:50%;transform: translate(-50%, -50%);">
        <img src="assets/logos/logo.256.png" class="logo" alt="box4fit"/>
      </div>
      <div class="loading-version" id="loading-version">
      </div>
      <div class="loading-progress-panel" aria-live="polite">
        <div class="loading-status" id="loading-status">Loading Box4Fit</div>
        <progress class="loading-progress" id="loading-progress" value="0" max="1" aria-label="Loading Box4Fit"></progress>
        <div class="loading-count" id="loading-count">0%</div>
      </div>
    </div>
    <aside class="face-recognition-panel" id="face-recognition-panel" aria-label="Face recognition status">
      <div class="face-recognition-header">
        <button class="face-register-button" id="face-register-button" type="button">Register Face</button>
      </div>
      <dl class="face-recognition-grid">
        <div>
          <dt>Matched player</dt>
          <dd id="face-recognition-match">Unknown player</dd>
        </div>
      </dl>
    </aside>
    <button class="pwa-install-button" id="pwa-install-button" type="button">Install Box4Fit</button>
    <noscript>Box4Fit needs JavaScript enabled to run the webcam boxing game.</noscript>
  </main>
  <footer id="app-footer">
    <span id="app-version"></span>
  </footer>
  <script src="js/version.js"></script>
  <script src="js/app.js"></script>
  <script>
    const installed = globalThis.matchMedia('(display-mode: standalone)').matches;
    document.getElementById('app-version').textContent = `${globalThis.APP_VERSION} ${installed ? '📱' : '🌐'}`;
  </script>
</body>

</html>
