<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A webcam boxing fitness game with motion detection">
  <meta name="keywords" content="boxing, fitness, game, online">
  <meta name="author" content="Saashup">
  <meta name="theme-color" content="#050505">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>Box4Fit</title>
  <link rel="manifest" href="manifest.json" />
  <script src="js/p5js/p5.js"></script>
  <script src="js/p5js/p5.sound.js"></script>
  <script src="js/ml5js/ml5.min.js"></script>
  <script src="js/game-utils.js"></script>
  <script src="js/vars.js"></script>
  <script src="js/game-assets.js"></script>
  <script src="js/game-calibration.js"></script>
  <script src="js/game-input.js"></script>
  <script src="js/game-logic.js"></script>
  <script src="js/game-render.js"></script>
  <script src="js/game-score.js"></script>
  <script src="js/pose-detection.js"></script>
  <script src="js/fight-mode.js"></script>
  <script src="js/pad-mode.js"></script>
  <script src="js/shadow-mode.js"></script>
</head>

<body>
  <main>
    <div id="p5_loading">
      <div style="position: absolute;left:50%;top:50%;transform: translate(-50%, -50%);">
        <div class="loader"></div>
      </div>
      <div style="position: absolute;left:50%;top:50%;transform: translate(-50%, -50%);">
        <img src="assets/logos/logo.256.png" class="logo" alt="box4fit"/>
      </div>
      <div class="loading-version">
        Box4Fit © 2026 (v1.11.3)
      </div>
    </div>
    <noscript>Box4Fit needs JavaScript enabled to run the webcam boxing game.</noscript>
  </main>
  <script src="js/app.js"></script>
</body>

</html>
