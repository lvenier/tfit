<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>tfIt</title>
  <link href="/bs/bootstrap.min.css" rel="stylesheet">
  <script src="/bs/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/jquery/jquery-3.6.0.min.js"></script>
  <script src="/js/main.js"></script>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">tfIt</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Boxing</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Fitness</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Dancing</a>
          </li>
          <li class="nav-item">
            <a class="nav-link">Settings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link">Docs</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <header>
    <div class="container">
      <div class="row m-3 text-center">
        <div class="col-3 p-3" id="lefthand">lefthand</div>
        <div class="col-3 p-3" id="righthand">righthand</div>
        <div class="col-3 p-3" id="leftfeet">leftfeet</div>
        <div class="col-3 p-3" id="rightfeet">rightfeet</div>
      </div>
    </div>
  </header>

  <main role="main" class="container" style="margin:25px;">
    <div class="row" id="boxing">
      <div class="col-4">
        <div class="col-12 m-5 boxing" id="boxing_lefthandstraight">left straight</div>
        <div class="col-12 m-5 boxing" id="boxing_righthandstraight">right straight</div>
        <div class="col-12 m-5 boxing" id="boxing_lefthanduppercut">left uppercut</div>
        <div class="col-12 m-5 boxing" id="boxing_righthanduppercut">right uppercut</div>
        <div class="col-12 m-5 boxing" id="boxing_lefthandhook">left hook</div>
        <div class="col-12 m-5 boxing" id="boxing_righthandhook">right hook</div>
      </div>
      <div class="col-4"></div>
      <div class="col-4"></div>
    </div>
  </main>

</body>

</html>
