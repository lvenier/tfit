<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>TFIT</title>
  <link href="/bs/bootstrap.min.css" rel="stylesheet">
  <script src="/bs/bootstrap.bundle.min.js"></script>
  <script src="/jquery/jquery-3.6.0.min.js"></script>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand nav-link text-white" href="/">TFIT</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <main role="main" class="container">
    <div class="form-group row" id="login-page">
      <div class="col-sm-12 col-md-4 offset-md-4 my-5 text-center">
        <input type="text" id="key" class="form-control my-3" placeholder="key"/>
        <input id="login-btn" type="button" class="btn btn-primary m-3 p-3" value="Set">
      </div>
    </div>    
  </main>

  <script>
    $("#login-btn").on("click", function() {
      $.ajax({
        url: "/api/login?key=" + $("#key").val()
      }).done(function(result) {
        if ('status' in result && result.status === "success") {
          localStorage.setItem('key', $("#key").val())
          window.location.replace("/");
        } else alert(result.status)
      });
    })
  </script>

  <footer class="bg-primary text-center text-white p-3" style="position:absolute; bottom:0px;width:100%;">
    ©2022 Copyright saashup.com
  </footer>
</body>

</html>
